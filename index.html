
<style>
*{box-sizing:border-box;margin:0;padding:0;}
#kapp{font-family:var(--font-sans);background:#110d04;border-radius:12px;padding:0 0 24px;display:flex;flex-direction:column;align-items:center;color:#f5e6c8;overflow:hidden;}
#hero{width:100%;background:#110d04;display:flex;flex-direction:column;align-items:center;padding:20px 16px 14px;border-bottom:0.5px solid #3a2a10;}
#stitle{font-size:12px;letter-spacing:2.5px;color:#c8922a;text-transform:uppercase;font-weight:500;margin-top:10px;text-align:center;}
#ssub{font-size:11px;color:#6a5030;text-align:center;letter-spacing:1px;margin-top:2px;}
#ld{width:100%;max-width:640px;display:flex;flex-direction:column;align-items:center;padding:12px 16px 0;gap:0;}
.gl{font-size:13px;color:#af8e63;text-align:center;min-height:18px;line-height:1.4;width:100%;padding:1px 8px;}
.glb{font-size:12px;color:#2e1f0a;text-align:center;min-height:15px;line-height:1.3;width:100%;padding:1px 8px;}
#cb{width:100%;background:#1e1206;border-radius:10px;border:0.5px solid #4a3010;padding:16px 18px 12px;margin:8px 0;}
#cen{text-align:center;color:#f0ddb0;line-height:1.5;margin-bottom:7px;word-break:break-word;font-weight:500;}
.hi{color:#f5c542;}.di{color:#e8d090;}

#cbn{text-align:center;color:#c8922a;line-height:1.6;word-break:break-word;}
#controls{display:flex;align-items:center;gap:12px;margin-top:14px;flex-wrap:wrap;justify-content:center;}
#pb{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;background:#c8922a;color:#110d04;font-size:18px;display:flex;align-items:center;justify-content:center;}
#pb:hover{background:#e0aa40;}
#rb{background:transparent;border:0.5px solid #4a3010;border-radius:8px;padding:6px 14px;color:#c8922a;cursor:pointer;font-size:13px;font-family:var(--font-sans);}
#rb:hover{background:#1e1206;}
.cr{display:flex;align-items:center;gap:8px;font-size:12px;color:#5a4020;}
.cr input[type=range]{width:72px;}
.cv{font-size:12px;color:#c8922a;min-width:32px;}
#pw{width:100%;max-width:640px;padding:12px 16px 0;}
#pgb{width:100%;height:2px;background:#1e1206;border-radius:1px;overflow:hidden;}
#pgf{height:100%;background:#c8922a;border-radius:1px;width:0%;transition:width 0.1s linear;}
#lc{font-size:11px;color:#3a2810;margin-top:5px;text-align:center;}
@keyframes glow {
0% {
box-shadow:0 0 12px rgba(200,146,42,.25);
}

50% {
box-shadow:0 0 30px rgba(200,146,42,.7);
}

100% {
box-shadow:0 0 12px rgba(200,146,42,.25);
}
}

#cb{
background:
linear-gradient(
180deg,
#2a1907 0%,
#1a1005 100%
);

border:1px solid #5a3a12;

box-shadow:
0 0 25px rgba(200,146,42,.15);
}

#cen,
#cbn{
transition:
opacity .35s ease,
transform .35s ease;
}

.fade-out{
opacity:0;
transform:translateY(8px);
}

.fade-in{
opacity:1;
transform:translateY(0);
}

.gl{
opacity:.45;
transition:.3s ease;
}

</style>

<div id="kapp">
<div id="hero">
<img src="Mile.png"
     style="
       width:120px;

       border-radius:50%;
       object-fit:cover;

     ">
<div id="stitle">Mi Le Jiu Ku Zhen Jing</div>
<div id="ssub">彌勒救苦真經 · মি লে জিউ কু ঝেন জিং</div>
</div>

<div id="ld">
  <div class="gl" id="pen"></div>

<div id="controls">

</div>

<div id="pw">
  <div id="pgb"><div id="pgf"></div></div>
  <div id="lc">Line 0 / 0</div>
</div>
</div>

let cur=0,playing=false,af=null,spd=1,tsz=20;
const pb=document.getElementById('pb');

const cen=document.getElementById('cen');
const cbn=document.getElementById('cbn');
const pen=document.getElementById('pen');
const pbn=document.getElementById('pbn');
const nen=document.getElementById('nen');
const nbn=document.getElementById('nbn');
const pgf=document.getElementById('pgf');
const lc=document.getElementById('lc');
const spdSlider=document.getElementById('spd');
const sv=document.getElementById('sv');
const tszSlider=document.getElementById('tsz');
const tv=document.getElementById('tv');
function smoothRender(){

  cen.classList.add("fade-out");
  cbn.classList.add("fade-out");

  setTimeout(()=>{

    render();

    cen.classList.remove("fade-out");
    cbn.classList.remove("fade-out");

    cen.classList.add("fade-in");
    cbn.classList.add("fade-in");

  },180);
}
function render(){
  const[en,bn]=lines[cur];
  cen.textContent=en;cen.style.fontSize=tsz+'px';
  cbn.textContent=bn;cbn.style.fontSize=Math.max(13,tsz-3)+'px';
  pen.textContent=cur>0?lines[cur-1][0]:'';
  pbn.textContent=cur>0?lines[cur-1][1]:'';
  nen.textContent=cur<lines.length-1?lines[cur+1][0]:'';
  nbn.textContent=cur<lines.length-1?lines[cur+1][1]:'';
  //bf.style.width='0%';
  pgf.style.width=Math.round(cur/(lines.length-1)*100)+'%';
  lc.textContent='Line '+(cur+1)+' / '+lines.length;
}

function dur(en){return Math.max(1200,en.length*105/spd);}

function animBar(duration){
  if(af)cancelAnimationFrame(af);
  const t0=performance.now();
  function step(now){
    const pct=Math.min((now-t0)/duration*100,100);
    
    const txt = lines[cur][0];
    const chars = Math.floor(txt.length * pct / 100);

    cen.innerHTML =
      '<span class="hi">' +
     txt.substring(0, chars) +
      '</span>' +
      '<span class="di">' +
      txt.substring(chars) +
      '</span>';
    if(pct<100){af=requestAnimationFrame(step);}
    else if(playing){advance();}
  }
  af=requestAnimationFrame(step);
}

function advance(){
  if(cur<lines.length-1){cur++;render();animBar(dur(lines[cur][0]));}
  else{playing=false;pb.textContent='▶';}
}

function toggle(){
  if(playing){playing=false;pb.textContent='▶';if(af)cancelAnimationFrame(af);}
  else{
    playing=true;pb.textContent='⏸';
    if(cur>=lines.length-1){cur=0;render();}
    animBar(dur(lines[cur][0]));
  }
}

pb.addEventListener('click',toggle);
document.getElementById('rb').addEventListener('click',()=>{
  if(af)cancelAnimationFrame(af);
  playing=false;pb.textContent='▶';cur=0;render();
  cen.textContent='Press play to begin';cbn.textContent='— চালু করুন —';
});
spdSlider.addEventListener('input',()=>{spd=parseFloat(spdSlider.value);sv.textContent=spd.toFixed(1)+'×';});
tszSlider.addEventListener('input',()=>{
  tsz=parseInt(tszSlider.value);tv.textContent=tsz+'px';
  cen.style.fontSize=tsz+'px';cbn.style.fontSize=Math.max(13,tsz-3)+'px';
});

render();
cen.textContent='Press play to begin';cbn.textContent='— চালু করুন —';
</script>
